<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>

    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- HEADER -->
    <header>
        <h1>Contact Us</h1>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="feedback.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <!-- MAIN -->
    <main>

        <h2>Send Us a Message</h2>

        <form>

            <!-- DETAILS -->
            <fieldset>
                <legend>Your Details</legend>

                <label for="name">Full Name:</label>
                <input type="text" id="name" name="name" required>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>

                <label for="phone">Phone:</label>
                <input type="tel" id="phone" name="phone">
            </fieldset>

            <!-- MESSAGE -->
            <fieldset>
                <legend>Your Message</legend>

                <label for="subject">Subject:</label>
                <input type="text" id="subject" name="subject" required>

                <label for="message">Message:</label>
                <textarea id="message" name="message" rows="5" required></textarea>
            </fieldset>

            <!-- REFERRAL -->
            <fieldset>
                <legend>How did you hear about us?</legend>

                <label><input type="radio" name="referral" value="search" required> Search Engine</label>
                <label><input type="radio" name="referral" value="social"> Social Media</label>
                <label><input type="radio" name="referral" value="friend"> Friend</label>
                <label><input type="radio" name="referral" value="other"> Other</label>
            </fieldset>

            <button type="submit">Submit</button>

        </form>

        <!-- TABLE -->
        <section>
            <h2>Received Messages</h2>

            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Subject</th>
                        <th>Date</th>
                    </tr>
                </thead>

                <tbody>
                    <tr>
                        <td>John Smith</td>
                        <td>john@email.com</td>
                        <td>Course Inquiry</td>
                        <td>2026-03-10</td>
                    </tr>

                    <tr>
                        <td>Sarah Johnson</td>
                        <td>sarah@email.com</td>
                        <td>Feedback</td>
                        <td>2026-03-09</td>
                    </tr>
                </tbody>
            </table>
        </section>

    </main>

    <!-- FOOTER -->
    <footer>
        <p>&copy; 2026 Your Company Name</p>
    </footer>

</body>
</html>
